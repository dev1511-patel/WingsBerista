<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WingsBerista — Fresh. Fast. Delicious.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <nav>
    <a class="logo" onclick="goTo('home')">Wings<span>Berista</span></a>
    <ul class="nav-links">
      <li><a id="nav-home" class="active" onclick="goTo('home')">Home</a></li>
      <li><a id="nav-menu" onclick="goTo('menu')">Menu</a></li>
      <li><a id="nav-order" onclick="goTo('order')">Order</a></li>
      <li><a id="nav-admin" onclick="handleAdminClick()">Admin</a></li>
    </ul>
    <div class="nav-right">
      <div id="nav-user-area"></div>
      <button class="cart-btn" onclick="toggleCart()">🛒 Cart <span class="badge" id="cart-count">0</span></button>
    </div>
  </nav>

  <div id="main-content"></div>

  <div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>
  <div class="cart-panel" id="cart-panel">
    <div class="cart-head"><h2>Your Order</h2><button class="close-btn" onclick="toggleCart()">✕</button></div>
    <div class="cart-items" id="cart-items-list"></div>
    <div id="cart-footer"></div>
  </div>

  <footer id="site-footer">
  <div class="footer-grid">
    <div class="footer-brand">
      <img src="Images/wing-barista.webp" alt="WingsBerista" class="footer-logo" />
      <p>Where café comfort meets street food flavour.</p>
    </div>
    <div class="footer-links">
      <h4>Quick Links</h4>
      <a onclick="goTo('about')">About Us</a>
      <a onclick="goTo('menu')">Menu</a>
      <a onclick="goTo('contact')">Contact Us</a>
    </div>
    <div class="footer-hours">
      <h4>Cafe Hours</h4>
      <p>🕒 8:00 AM - 5:00 PM</p>
      <p>📅 7 Days a Week</p>
    </div>
  </div>
  <div class="footer-bottom">
    <p>&copy; 2026 <strong>WingsBerista</strong>. All rights reserved.</p>
    <div class="social-icons">
      <span>📱</span>
      <span>📸</span>
    </div>
  </div>
</footer>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/pages/home.js"></script>
   <script src="js/pages/about_contact.js"></script>
  <script src="js/pages/menu.js"></script>
  <script src="js/pages/order.js"></script>
  <script src="js/pages/admin.js"></script>
  <script src="js/pages/auth_pages.js"></script>
  <script src="js/app.js"></script>

  
</body>
</html>
